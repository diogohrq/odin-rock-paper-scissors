<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="./js/script.js"></script>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <title>Odin | Rock, Paper and Scissors</title>
  </head>
  <body>
    <section class="container">
      <section class="header">
        <a href="./index.html" class="header-logo">
          rock <br>
          paper <br>
          scissors
        </a>
        <div class="header-scoreboard">
          <p>score</p>
          <p class="header-score">0</p>
        </div>
      </section>

      <section class="gameboard">
        <button class="gameboard-button button-paper" data-option="paper">
          <img src="images/icon-paper.svg" alt="Paper">
        </button>
        <button class="gameboard-button button-scissors" data-option="scissors">
          <img src="./images/icon-scissors.svg" alt="Scissors">
        </button>
        <button class="gameboard-button button-rock" data-option="rock">
          <img src="./images/icon-rock.svg" alt="Rock">
        </button>
      </section>

      <section class="gameboard-info">
        <p class="gameboard-info-result"></p>
        <p class="gameboard-info-details"></p>
      </section>
    </section>
  </body>
</html>
